<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הטיול שלנו לטביליסי 🇬🇪</title>
<style>
  :root {
    --cream: #faf3e7;
    --cream-deep: #f1e3cc;
    --paper: #fffaf1;
    --wine: #7a2331;
    --wine-deep: #5c1a25;
    --terracotta: #c9682f;
    --terracotta-light: #e8935a;
    --olive: #6b7a4f;
    --gold: #c79a3e;
    --ink: #3a2e26;
    --muted: #8a7666;
    --line: #e4d3b8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background:
      radial-gradient(1200px 500px at 50% -10%, var(--cream-deep), transparent),
      var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }
  header {
    text-align: center;
    padding: 48px 20px 16px;
    position: relative;
  }
  header::after {
    content: "";
    display: block;
    width: 90px;
    height: 4px;
    margin: 18px auto 0;
    background: linear-gradient(90deg, var(--terracotta), var(--gold));
    border-radius: 4px;
  }
  header h1 {
    margin: 0;
    font-size: 2.1rem;
    color: var(--wine);
    letter-spacing: .3px;
  }
  header p {
    color: var(--muted);
    margin-top: 10px;
    font-size: 1.05rem;
  }
  nav {
    max-width: 900px;
    margin: 0 auto;
    padding: 34px 16px 0;
    border-bottom: 1px solid var(--line);
  }
  .cards-grid {
    display: flex;
    gap: 4px;
    overflow-x: auto;
  }
  .step {
    flex: 1;
    min-width: 100px;
    height: 84px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    padding: 10px 8px 13px;
    cursor: pointer;
    font-family: inherit;
    color: var(--muted);
    transition: color .2s ease, border-color .2s ease, background .2s ease;
    border-radius: 8px 8px 0 0;
  }
  .step .icon {
    display: none;
  }
  .step .date {
    font-weight: 600;
    font-size: .72rem;
    letter-spacing: .8px;
    text-transform: uppercase;
    opacity: .8;
  }
  .step .label {
    font-size: .92rem;
    font-weight: 600;
    text-align: center;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    overflow: hidden;
  }
  .step:hover {
    color: var(--ink);
    background: rgba(122,35,49,.04);
  }
  .step.active {
    color: var(--wine);
    border-bottom-color: var(--wine);
    background: rgba(122,35,49,.05);
  }
  .step.active .date {
    color: var(--terracotta);
    opacity: 1;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }
  .day {
    display: none;
    animation: fade .35s ease;
  }
  .day.active {
    display: block;
  }
  @keyframes fade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 26px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(90,50,20,.08);
  }
  .card h2 {
    color: var(--wine);
    margin-top: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.4rem;
  }
  .badge {
    background: linear-gradient(135deg, var(--gold), var(--terracotta));
    color: #fff;
    border-radius: 8px;
    padding: 3px 12px;
    font-size: .82rem;
    font-weight: bold;
    box-shadow: 0 2px 8px rgba(199,154,62,.35);
  }
  .cover {
    width: 100%;
    border-radius: 14px;
    max-height: 260px;
    object-fit: cover;
    margin-bottom: 18px;
    border: 1px solid var(--line);
  }
  .map-wrap {
    position: relative;
    width: 100%;
    padding-bottom: 65%;
    border-radius: 14px;
    overflow: hidden;
    margin: 18px 0;
    border: 1px solid var(--line);
  }
  .map-wrap iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
  ul.plan {
    line-height: 2;
    padding-right: 22px;
    margin: 0;
    color: var(--ink);
  }
  ul.plan li::marker {
    color: var(--terracotta);
    font-size: 1.1em;
  }
  .tip {
    background: rgba(107,122,79,.1);
    border-right: 4px solid var(--olive);
    padding: 12px 16px;
    border-radius: 10px;
    margin-top: 16px;
    color: #4d5a3a;
    font-size: .95rem;
  }
  .tbd {
    text-align: center;
    color: var(--muted);
    padding: 34px 10px;
    border: 2px dashed var(--line);
    border-radius: 14px;
    background: repeating-linear-gradient(135deg, rgba(199,104,47,.04) 0 10px, transparent 10px 20px);
  }
  footer {
    text-align: center;
    color: var(--muted);
    padding-bottom: 30px;
    font-size: .85rem;
  }
</style>
</head>
<body>

<header>
  <h1>הטיול שלנו לטביליסי 🇬🇪</h1>
  <p>26–30 ביולי 2026</p>
</header>

<nav><div class="cards-grid" id="nav"></div></nav>

<main id="main"></main>

<footer>נסיעה טובה! ✈️</footer>

<script>
const days = [
  {
    id: 1,
    title: "יום 1 — טיסה לטביליסי",
    label: "טיסה",
    icon: "✈️",
    badge: "26.7",
    cover: "https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=1200&q=80",
    plan: [
      "המראה בשעה 21:30 (9:30 בערב)",
      "נחיתה והגעה למלון בטביליסי בסביבות השעה 02:00 בלילה (כבר יום שני, 27.7)",
    ],
  },
  {
    id: 2,
    title: "יום 2 — טביליסי",
    label: "העיר העתיקה ושופינג  ",
    icon: "🏛️",
    badge: "27.7",
    cover: "images/day2-tbilisi.png",
    map: `<iframe src="https://www.google.com/maps/d/embed?mid=1uVA_1FQCR4vVb8a_Hw_FAcV7Cowf0Ps&ehbc=2E312F" loading="lazy"></iframe>`,
    plan: [
      "הגעה לטביליסי והתארגנות",
      "סיור ברחבי העיר העתיקה לפי המפה המצורפת",
      "כל הנקודות והמסלול המתוכננים מסומנים על המפה למטה"
    ],
    tip: "המפה היא מפת Google My Maps מותאמת אישית — אפשר ללחוץ על הסימונים לפרטים נוספים."
  },
  {
    id: 3,
    title: "יום 3 — הכביש הצבאי הגרוזיני",
    label:"הדרך הצבאית",
    icon: "🏔️",
    badge: "28.7",
    cover: "https://lh3.googleusercontent.com/gps-cs-s/AHRPTWmECIp_qw3SG6F0a5AYCcWzyQIppd1HChOp1HvJHHRz-aejNLVoa-9l1sdODZ0w2o1iR4x4haXWGO4hJ1ldGOApygsz502sotRxoqDQEvIItYxjQurA1B26ygszYroR3iWK8Y27bOXFwiiY=w1200-h800-k-no",
    map: `<iframe src="https://www.google.com/maps?q=Georgian+Military+Road,+Georgia&output=embed" loading="lazy"></iframe>`,
    plan: [
      "יציאה בבוקר לכיוון הכביש הצבאי הגרוזיני (Georgian Military Road)",
      "עצירות לאורך הדרך בנופים ההרריים",
      "מומלץ לבדוק מזג אוויר בהרים לפני היציאה"
    ],
    tip: "הכביש חוצה את הרי הקווקז ומוביל לכיוון גרגטי וקזבגי — כדאי לצאת מוקדם."
  },
  {
    id: 4,
    title: "יום 4 — גשר היהלום",
    label: "גשר היהלום",
    icon: "🌉",
    badge: "29.7",
    cover: "images/day4-diamond-bridge.png",
    map: `<iframe src="https://www.google.com/maps?q=Diamond+Bridge+Georgia&output=embed" loading="lazy"></iframe>`,
    plan: [
      "נסיעה לגשר היהלום (Diamond Bridge)",
      "זמן חופשי לצילומים ולסיור באזור",
      "פרטים נוספים יעודכנו בהמשך"
    ],
    tip: "כדאי לוודא מראש את המיקום המדויק ושעות הגעה נוחות."
  },
  {
    id: 5,
    title: "יום 5 — עוד לא הוחלט",
    label: "עוד לא הוחלט",
    icon: "❓",
    badge: "30.7",
    tbd: true
  }
];

const nav = document.getElementById('nav');
const main = document.getElementById('main');

days.forEach((d, i) => {
  const step = document.createElement('button');
  step.className = 'step' + (i === 0 ? ' active' : '');
  step.onclick = () => showDay(i);
  step.innerHTML = `
    <span class="icon">${d.icon}</span>
    <span class="date">${d.badge}</span>
    <span class="label">${d.label}</span>
  `;
  nav.appendChild(step);

  const section = document.createElement('div');
  section.className = 'day' + (i === 0 ? ' active' : '');
  section.id = `day-${d.id}`;

  let html = `<div class="card"><h2>${d.title} <span class="badge">${d.badge}</span></h2>`;
  if (d.tbd) {
    html += `<div class="tbd">🤔 עדיין לא סגור מה נעשה ביום הזה — נעדכן בקרוב!</div>`;
  } else {
    if (d.cover) html += `<img class="cover" src="${d.cover}" alt="${d.title}">`;
    html += `<ul class="plan">${d.plan.map(p => `<li>${p}</li>`).join('')}</ul>`;
    if (d.map) html += `<div class="map-wrap">${d.map}</div>`;
    if (d.tip) html += `<div class="tip">💡 ${d.tip}</div>`;
  }
  html += `</div>`;
  section.innerHTML = html;
  main.appendChild(section);
});

function showDay(index) {
  document.querySelectorAll('.step').forEach((b, i) => b.classList.toggle('active', i === index));
  document.querySelectorAll('.day').forEach((s, i) => s.classList.toggle('active', i === index));
}
</script>

</body>
</html>
